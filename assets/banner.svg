<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plethora Player">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070a16"/>
      <stop offset="0.55" stop-color="#0b1024"/>
      <stop offset="1" stop-color="#0a0f20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.16" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#5b6cff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#5b6cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#9b5cff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#9b5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="100" y1="90" x2="230" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3bd0ff"/>
      <stop offset="0.5" stop-color="#5b78ff"/>
      <stop offset="1" stop-color="#9b5cff"/>
    </linearGradient>
    <linearGradient id="word" x1="300" y1="160" x2="560" y2="235" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#46c8ff"/>
      <stop offset="1" stop-color="#9b6bff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="22" fill="url(#glow)"/>
  <rect width="1200" height="300" rx="22" fill="url(#glow2)"/>

  <!-- play / P icon -->
  <g transform="translate(92,84)">
    <ellipse cx="66" cy="80" rx="96" ry="30" transform="rotate(-24 66 80)" stroke="url(#accent)" stroke-width="5" fill="none" opacity="0.55"/>
    <rect x="6" y="6" width="120" height="120" rx="34" fill="url(#accent)"/>
    <path d="M54 42 L100 66 L54 90 Z" fill="#ffffff"/>
    <path d="M150 2 l4.5 13 13 4.5 -13 4.5 -4.5 13 -4.5 -13 -13 -4.5 13 -4.5 z" fill="#cfe6ff"/>
  </g>

  <!-- wordmark -->
  <text x="286" y="148" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="80" font-weight="800" letter-spacing="-2" fill="#ffffff">Plethora</text>
  <text x="286" y="226" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="80" font-weight="800" letter-spacing="-2" fill="url(#word)">Player</text>

  <!-- tagline -->
  <text x="292" y="266" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="0.3" fill="#8b93a9">Live TV · Movies · Series · Twitch · Kick · Rumble — one player</text>
</svg>
